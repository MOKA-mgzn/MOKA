<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MOKA | Mensaje enviado</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: #F8EEF2;

            font-family: 'Inter', sans-serif;

            text-align: center;

            padding: 20px;
        }

        .gracias-container{

            max-width: 700px;

            background: white;

            padding: 60px 40px;

            border-radius: 20px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .gracias-container h1{

            font-family: 'Playfair Display', serif;

            font-size: 3rem;

            color: #591E29;

            margin-bottom: 20px;
        }

        .gracias-container p{

            font-size: 1.1rem;

            line-height: 1.8;

            color: #333;

            margin-bottom: 30px;
        }

        .volver-btn{

            display: inline-block;

            padding: 14px 30px;

            background-color: #591E29;

            color: white;

            text-decoration: none;

            border-radius: 10px;

            transition: 0.3s ease;
        }

        .volver-btn:hover{

            background-color: #A6686E;

            transform: translateY(-2px);
        }

    </style>

</head>

<body>

    <div class="gracias-container">

        <h1>¡Gracias por escribirnos!</h1>

        <p>
            Tu mensaje fue enviado correctamente.
            En MOKA valoramos cada consulta, propuesta y recomendación.
            Leeremos tu mensaje y nos pondremos en contacto contigo lo antes posible. 
        </p>

        <a href="index.html" class="volver-btn">
            Volver al inicio
        </a>

    </div>

</body>

</html>
